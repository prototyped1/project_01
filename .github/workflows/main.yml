name: Deploy CloudFormation Stacks

# Controls when the action will run.
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      region:
        description: "AWS Region"
        required: true
        default: "ap-southeast-2"
      bucketName:
        description: "S3 Bucket Name (must be globally unique)"
        default: "imba-gwen"
        required: true

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  cfn-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        id: creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }} 

      - name: Check if S3 bucket exists
        id: check-bucket
        run: |
          if aws s3api head-bucket --bucket ${{ github.event.inputs.bucketName }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Bucket already exists, skipping creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Bucket does not exist, will create."
          fi

      - name: Cleanup failed CloudFormation stack
        if: steps.check-bucket.outputs.exists == 'false'
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name s3-buckets --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name s3-buckets
            aws cloudformation wait stack-delete-complete --stack-name s3-buckets
            echo "Stack deleted."
          fi

      - name: Deploy S3 Buckets CloudFormation Stacks
        id: s3-buckets
        if: steps.check-bucket.outputs.exists == 'false'
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name:  s3-buckets
          template: cfn/s3.yml
          no-fail-on-empty-changeset: "1"
          parameter-overrides: >-
            BucketName=${{ github.event.inputs.bucketName }}
